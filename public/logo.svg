<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 210" role="img" aria-label="New Top Ten Plus — Tailors Fabrics Fashion">
  <rect x="4" y="4" width="552" height="202" rx="16" fill="#e01212"/>
  <rect x="13" y="13" width="534" height="184" rx="11" fill="none" stroke="#ffffff" stroke-width="3"/>

  <g font-family="'Segoe UI', 'Arial Black', Arial, sans-serif" fill="#ffffff">
    <!-- New -->
    <text x="36" y="56" font-size="23" font-style="italic" font-weight="800">New</text>

    <!-- Top / Ten wordmark -->
    <text x="34" y="132" font-size="84" font-weight="800" letter-spacing="-1">Top</text>
    <text x="300" y="132" font-size="84" font-weight="800" letter-spacing="-1">Ten</text>

    <!-- Plus -->
    <text x="452" y="128" font-size="26" font-weight="800">Plus</text>
  </g>

  <!-- House + medical-cross emblem (between Top and Ten) -->
  <g>
    <!-- stacked chevron roof -->
    <polyline points="226,66 250,45 274,66" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="226,80 250,59 274,80" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- white house body -->
    <rect x="230" y="82" width="40" height="38" rx="4" fill="#ffffff"/>
    <!-- red medical cross -->
    <rect x="246" y="88" width="8" height="26" fill="#e01212"/>
    <rect x="237" y="97" width="26" height="8" fill="#e01212"/>
  </g>

  <!-- Tagline chips -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">
    <rect x="86" y="152" width="118" height="36" rx="9" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <text x="145" y="177" text-anchor="middle">Tailors</text>
    <rect x="216" y="152" width="120" height="36" rx="9" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <text x="276" y="177" text-anchor="middle">Fabrics</text>
    <rect x="348" y="152" width="126" height="36" rx="9" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <text x="411" y="177" text-anchor="middle">Fashion</text>
  </g>
</svg>
