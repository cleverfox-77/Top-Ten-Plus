<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-label="New Top Ten Plus — Tailors Fabrics Fashion">
  <rect x="4" y="4" width="632" height="192" rx="14" fill="#e01212"/>
  <rect x="14" y="14" width="612" height="172" rx="10" fill="none" stroke="#ffffff" stroke-width="3"/>

  <!-- New -->
  <text x="40" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-style="italic" font-weight="700" fill="#ffffff">New</text>

  <!-- Top -->
