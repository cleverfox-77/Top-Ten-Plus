  <!-- House + medical cross emblem -->
  <g transform="translate(292,44)">
    <path d="M28 2 L54 22 L48 22 L28 8 L8 22 L2 22 Z" fill="#ffffff"/>
    <path d="M28 20 L52 38 L52 40 L4 40 L4 38 Z" fill="#ffffff"/>
    <rect x="10" y="42" width="36" height="34" rx="3" fill="#ffffff"/>
    <rect x="25" y="48" width="6" height="22" fill="#e01212"/>
